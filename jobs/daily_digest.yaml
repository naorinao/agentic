name: daily_digest
skills:
  - default
  - digest
  - daily_digest_task
fetch:
  type: http_api
  url: https://jsonplaceholder.typicode.com/todos/1
  method: GET
  summary_hint: Example API payload for validating the MVP pipeline.
mcp:
  enabled: true
  transport: stdio
  command: python
  args:
    - -m
    - app.mcp_server
  tool_prefix: ops
notify:
  slack_webhook_env: SLACK_WEBHOOK_URL
