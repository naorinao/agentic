name: daily_digest
prompt: >-
  Review the fetched API payload, decide if it is important enough for Slack,
  and prepare a concise message when needed.
slack_template:
  title: Team Daily Report
  tone: clear and actionable
  audience: team
  sections:
    - key: completed
      label: Today's Work
      type: bullet_list
      required: true
      min_items: 3
      max_items: 8
      instruction: List the concrete things completed today. Each bullet should include the action, the object worked on, and the specific outcome. Do not over-compress the details. When the source is GitHub activity, include the GitHub URL in each relevant bullet.
skills:
  - default
  - digest
fetch:
  type: http_api
  url: https://jsonplaceholder.typicode.com/todos/1
  method: GET
  summary_hint: Example API payload for validating the MVP pipeline.
mcp:
  enabled: true
  transport: stdio
  command: python
  args:
    - -m
    - app.mcp_server
  tool_prefix: ops
notify:
  slack_webhook_env: SLACK_WEBHOOK_URL
